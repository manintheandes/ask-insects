sources:
  - id: mosquito_v1_fixtures
    name: Ask Insects mosquito V1 fixture source
    source_type: local_fixture
    boundary: mosquitoes first
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/mosquito-v1
    artifacts:
      sqlite_index: artifacts/mosquito-v1/source_index.sqlite
      sqlite_payload_table: record_payloads
      source_status: artifacts/mosquito-v1/source_status.json
      source_receipt: artifacts/mosquito-v1/source_receipt.json
      gaps: artifacts/mosquito-v1/gaps.json
    lanes:
      - taxonomy
      - observations
      - media
      - literature
      - action_notes
    provenance_required: true
  - id: gbif_api
    name: Global Biodiversity Information Facility API
    source_type: public_api
    boundary: Aedes aegypti taxonomy and occurrence pulls, including deep hosted refreshes
    query_plane: gbif_species_match_and_occurrence_search
    api_base: https://api.gbif.org
    artifact_dir: artifacts/mosquito-v1/raw/gbif
    lanes:
      - taxonomy
      - observations
    provenance_required: true
    live_fetch: opt_in_hosted
  - id: inaturalist_api
    name: iNaturalist public observations API
    source_type: public_api
    boundary: bounded Aedes aegypti and mosquito observations with licensed photos, refreshed incrementally so existing source lanes are preserved
    query_plane: inaturalist_observation_search
    api_base: https://api.inaturalist.org/v1
    artifact_dir: artifacts/mosquito-v1/raw/inaturalist
    ingest_script: scripts/ingest_inaturalist_observations.py
    lanes:
      - observations
      - media
    provenance_required: true
    live_fetch: opt_in
  - id: mosquito_alert_gbif
    name: Mosquito Alert Aedes aegypti GBIF observations and images
    source_type: public_api_dataset
    boundary: Mosquito Alert Dataset GBIF occurrence records for Aedes aegypti, pinned to datasetKey 1fef1ead-3d02-495e-8ff1-6aeb01123408 and taxonKey 1651891, with still-image media metadata
    query_plane: gbif_dataset_occurrence_search_to_sqlite
    api_base: https://api.gbif.org
    dataset_key: 1fef1ead-3d02-495e-8ff1-6aeb01123408
    dataset_doi: 10.15470/t5a1os
    artifact_dir: artifacts/mosquito-v1/raw/mosquito_alert
    ingest_script: scripts/ingest_mosquito_alert_observations.py
    lanes:
      - observations
      - media
    provenance_required: true
    live_fetch: opt_in
  - id: vectornet_aedes_surveillance
    name: VectorNet ECDC/EFSA Aedes aegypti surveillance rows
    source_type: public_darwin_core_archive
    boundary: Official VectorNet ECDC/EFSA Darwin Core Archive rows where scientificName or verbatimIdentification materially identifies Aedes aegypti, preserving detection, absence-surveillance, sampling protocol, geography, date range, life stage, sex, count, and degree-of-establishment fields
    query_plane: vectornet_ipt_darwin_core_archive_to_sqlite_observation_and_ecology_records
    api_base: https://ipt.gbif.org
    dataset_key: 7a5757c3-58f8-4ff6-9662-32296965a2f3
    resource_url: https://ipt.gbif.org/resource?r=vndatabase
    archive_url: https://ipt.gbif.org/archive.do?r=vndatabase
    artifact_dir: artifacts/mosquito-v1/raw/vectornet_surveillance
    ingest_script: scripts/ingest_vectornet_surveillance.py
    license: CC-BY-4.0
    lanes:
      - observations
      - ecology
    provenance_required: true
    live_fetch: opt_in
    source_contract:
      observations:
        - source_row_number
        - occurrence_id
        - event_date
        - higher_geography
        - country_code
        - decimal_latitude_longitude_when_supplied
        - individual_count
        - life_stage
        - sex
        - sampling_protocol
        - degree_of_establishment
        - identification_remarks
        - exact_archive_and_filtered_row_locator
      ecology_summaries:
        - country_summary
        - degree_of_establishment_summary
        - presence_evidence_count
        - absence_surveillance_count
        - unclear_status_count
  - id: aedes_occurrence_ecology
    name: Aedes aegypti occurrence ecology summaries
    source_type: derived_sqlite_source
    boundary: GBIF and iNaturalist observation joins plus Mosquito Alert Aedes aegypti observations summarized into country, country-month, seasonality, range, and public habitat ecology records
    query_plane: indexed_observation_payloads_to_sqlite_ecology_records
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/ingest_occurrence_ecology.py
    input_sources:
      - gbif_api
      - inaturalist_api
      - mosquito_alert_gbif
    lanes:
      - ecology
    provenance_required: true
    live_fetch: derived_from_indexed_observations
  - id: aedes_image_atoms
    name: Aedes aegypti still-image assets, labels, and gaps
    source_type: derived_sqlite_source
    boundary: Derived Aedes aegypti still-image intelligence records from indexed iNaturalist and Mosquito Alert media rows, preserving image URLs, observation context, licenses, attribution, quality metadata, optional bounded image-byte mirrors with checksum, byte size, dimensions, EXIF presence when detectable, deterministic source-provided labels, and explicit structured gaps for missing labels, unclear licenses, failed downloads, or mirror limits
    query_plane: indexed_still_image_media_payloads_to_sqlite_image_atoms
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/ingest_image_atoms.py
    input_sources:
      - inaturalist_api
      - mosquito_alert_gbif
    lanes:
      - media
    provenance_required: true
    live_fetch: derived_from_indexed_image_sources
    source_contract:
      image_assets:
        - source_image_record_id
        - source_observation_record_id
        - image_url
        - source_url
        - license
        - attribution
        - creator
        - rights_holder
        - observed_on_or_event_date
        - country_or_place
        - latitude_longitude_when_supplied
        - quality_grade_when_supplied
        - image_format_when_supplied
        - checksum_when_mirrored
        - byte_size_when_mirrored
        - dimensions_when_mirrored_or_source_supplied
        - exif_presence_when_detectable
        - raw_asset_path_when_mirrored
        - exact_locator
      deterministic_labels:
        - quality_grade
        - life_stage_when_source_provided
        - sex_when_source_provided
        - basis_of_record
        - occurrence_status
        - image_format
        - media_type
      structured_gaps:
        - image_label_missing
        - image_license_unclear
        - image_download_failed
        - image_too_large
        - image_mirror_limit_applied
  - id: aedes_literature_openalex
    name: Aedes aegypti literature since 2020
    source_type: public_api_composite
    boundary: OpenAlex articles where Aedes aegypti is material in title, abstract, or accepted topic metadata from 2020-01-01 through run date
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/aedes-literature-2020
    artifacts:
      sqlite_index: artifacts/aedes-literature-2020/source_index.sqlite
      sqlite_payload_table: record_payloads
      sqlite_fulltext_table: literature_fulltext_units
      source_status: artifacts/aedes-literature-2020/source_status.json
      source_receipt: artifacts/aedes-literature-2020/source_receipt.json
      enrichment_receipt: artifacts/aedes-literature-2020/literature_enrichment_receipt.json
      gaps: artifacts/aedes-literature-2020/gaps.json
    lanes:
      - literature
    query_commands:
      - search literature
      - search fulltext
      - ask literature questions with metadata and legal full-text fallback
    provenance_required: true
    live_fetch: opt_in
    enrichment_sources:
      - pubmed_eutilities
      - unpaywall_api
  - id: ncbi_datasets_genome
    name: NCBI Datasets Aedes aegypti genome package
    source_type: local_or_hosted_dataset_package
    boundary: Aedes aegypti assembly GCF_002204515.2 assembly metadata, GFF features, and protein FASTA headers
    query_plane: sqlite_atomic_index
    package_layout: ncbi_dataset/data
    artifact_dir: artifacts/mosquito-v1/raw/ncbi_genome
    assembly_accession: GCF_002204515.2
    lanes:
      - genome_assemblies
      - genome_features
      - genes
      - transcripts
      - proteins
    provenance_required: true
    live_fetch: package_path_required
  - id: ncbi_biosamples
    name: NCBI BioSample Aedes aegypti sample metadata
    source_type: public_api
    boundary: Bounded NCBI BioSample records for Aedes aegypti, including accession, organism, sample name, strain or isolate when present, collection date, geography, tissue, isolation source, organization, and linked SRA identifiers when NCBI exposes them
    query_plane: ncbi_eutils_biosample_esearch_esummary_to_sqlite
    api_base: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
    artifact_dir: artifacts/mosquito-v1/raw/ncbi_biosamples
    ingest_script: scripts/ingest_ncbi_biosamples.py
    lanes:
      - biosamples
    provenance_required: true
    live_fetch: opt_in_bounded
  - id: aedes_expression_omics
    name: Aedes aegypti GEO/SRA expression omics metadata
    source_type: public_api_composite
    boundary: Bounded, paginated NCBI GEO DataSets and SRA metadata for Aedes aegypti expression, RNA-seq, and transcriptome studies, including GEO dataset or sample summaries and SRA run-level atoms where NCBI exposes run accessions
    query_plane: ncbi_eutils_geo_sra_to_sqlite_expression_records
    api_base: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
    artifact_dir: artifacts/mosquito-v1/raw/expression_omics
    ingest_script: scripts/ingest_expression_omics.py
    lanes:
      - expression
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      geo_records:
        - accession
        - title
        - sample_count_when_supplied
        - platform_when_supplied
        - summary
        - raw_esummary_batch_locator
      sra_run_records:
        - run_accession
        - experiment_accession
        - bioproject_when_supplied
        - biosample_when_supplied
        - platform_when_supplied
        - total_spots_and_bases_when_supplied
        - raw_esummary_batch_locator
  - id: vectorbase_aedes_genomics
    name: VectorBase/VEuPathDB Aedes aegypti genomics downloads
    source_type: public_bulk_download
    boundary: Official VectorBase current-release AaegyptiLVP_AGWG GFF, annotated protein FASTA, annotated CDS FASTA, annotated transcript FASTA, GO GAF, codon usage, identifier event history, and NCBI LinkOut files for Aedes aegypti genes, transcripts, CDS sequence summaries, protein sequence summaries, GO annotations, codon usage, identifier history, and cross-references
    query_plane: vectorbase_current_release_downloads_to_sqlite
    api_base: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG
    artifact_dir: artifacts/mosquito-v1/raw/vectorbase_genomics
    ingest_script: scripts/ingest_vectorbase_genomics.py
    files:
      gff: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/gff/data/VectorBase-68_AaegyptiLVP_AGWG.gff
      proteins: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/fasta/data/VectorBase-68_AaegyptiLVP_AGWG_AnnotatedProteins.fasta
      cds: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/fasta/data/VectorBase-68_AaegyptiLVP_AGWG_AnnotatedCDSs.fasta
      transcript_sequences: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/fasta/data/VectorBase-68_AaegyptiLVP_AGWG_AnnotatedTranscripts.fasta
      go: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/gaf/VectorBase-CURRENT_AaegyptiLVP_AGWG_GO.gaf.gz
      codon_usage: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/txt/VectorBase-68_AaegyptiLVP_AGWG_CodonUsage.txt
      id_events: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/txt/VectorBase-68_AaegyptiLVP_AGWG_ids_events.tab
      ncbi_linkout: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/xml/VectorBase-68_AaegyptiLVP_AGWG_NCBILinkout_Nucleotide.xml
    lanes:
      - genes
      - transcripts
      - proteins
      - genome_features
    provenance_required: true
    live_fetch: opt_in
  - id: aedes_uniprot_proteins
    name: UniProt Aedes aegypti protein and proteome metadata
    source_type: public_api
    boundary: Bounded UniProtKB protein records and UniProt proteome records for NCBI taxonomy 7159, preserving accession, protein name, gene names, function comments, GO and VectorBase cross-references, keywords, reviewed status, and proteome metadata when exposed by UniProt
    query_plane: uniprot_rest_to_sqlite_protein_records
    api_base: https://rest.uniprot.org
    artifact_dir: artifacts/mosquito-v1/raw/uniprot_proteins
    ingest_script: scripts/ingest_uniprot_proteins.py
    lanes:
      - proteins
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      protein_records:
        - accession
        - uniprot_id
        - reviewed_status
        - protein_name
        - gene_names
        - function_comment_when_supplied
        - go_and_vectorbase_cross_references
        - raw_uniprot_json_locator
      proteome_records:
        - proteome_id
        - description
        - protein_count_when_supplied
        - raw_proteome_json_locator
  - id: bold_api
    name: BOLD public Aedes aegypti DNA barcode records
    source_type: public_api
    boundary: Bounded public BOLD combined TSV records for Aedes aegypti DNA barcode specimens, including marker, country, collection metadata, BIN, GenBank accession, and sequence length when provided
    query_plane: bold_public_combined_tsv
    api_base: https://v3.boldsystems.org/index.php/API_Public/combined
    artifact_dir: artifacts/mosquito-v1/raw/bold
    ingest_script: scripts/ingest_bold_barcodes.py
    lanes:
      - dna_barcodes
    provenance_required: true
    live_fetch: opt_in
  - id: pmc_open_access_videos
    name: PMC open-access Aedes aegypti supplementary videos
    source_type: public_article_media
    boundary: Curated public PMC articles with Aedes aegypti supplementary moving-image files, especially behavior, host-seeking, biting, and photopreference clips
    query_plane: pmc_article_html_video_links
    artifact_dir: artifacts/mosquito-v1/raw/pmc_videos
    ingest_script: scripts/ingest_pmc_videos.py
    lanes:
      - media
    provenance_required: true
    live_fetch: opt_in
  - id: dryad_aedes_behavior_videos
    name: Dryad Aedes aegypti behavior and video dataset manifests
    source_type: public_dataset_api
    boundary: Public Dryad datasets with materially Aedes aegypti behavior/video data, including host-seeking, visual-threat, flight-escape, mating, courtship, and thermal-infrared assay files
    query_plane: dryad_dataset_version_file_manifest_to_sqlite
    api_base: https://datadryad.org/api/v2
