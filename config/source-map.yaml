    default_dois:
      - 10.5061/dryad.547d7wmh3
      - 10.5061/dryad.j6q573nr3
      - 10.5061/dryad.ttdz08m09
      - 10.5061/dryad.qz612jmrb
      - 10.5061/dryad.tb2rbp04x
      - 10.5061/dryad.z8w9ghxfv
  - id: mendeley_aedes_behavior_media
    name: Mendeley Data Aedes aegypti behavior, media, and table rows
    source_type: public_dataset_api
    boundary: Public Mendeley Data datasets where Aedes aegypti is materially present in the title, description, or topic, including high-speed mate-recognition videos, wingbeat sound files, flight-tone hearing data, locomotory behavior video-analysis files, and parsed public CSV/XLSX table rows in Aedes aegypti scope
    query_plane: mendeley_public_snapshot_folder_file_manifest_and_table_rows_to_sqlite
    api_base: https://data.mendeley.com/public-api
    artifact_dir: artifacts/mosquito-v1/raw/mendeley_behavior_media
    ingest_script: scripts/ingest_mendeley_behavior_media.py
    lanes:
      - behavior
      - media
    provenance_required: true
    live_fetch: opt_in
    default_datasets:
      - 6gvs94p6r2:1
      - g79w8wxpr7:2
      - sg5rrvdzvg:1
  - id: osf_flighttrackai_aedes_videos
    name: OSF FlightTrackAI Aedes aegypti videos and file manifest
    source_type: public_osf_project
    boundary: Public OSF project cx762 for FlightTrackAI, including Aedes aegypti flight-behavior video files, processed/unprocessed video folders, installation instructions, executable bundles, and trained model metadata
    query_plane: osf_project_file_manifest_to_sqlite
    api_base: https://api.osf.io/v2
    project_url: https://osf.io/cx762/
    project_id: cx762
    artifact_dir: artifacts/mosquito-v1/raw/osf_flighttrackai_videos
    ingest_script: scripts/ingest_osf_flighttrackai_videos.py
    lanes:
      - behavior
      - media
    provenance_required: true
    live_fetch: opt_in
    binary_policy: manifest_and_download_locators_only_by_default
  - id: zenodo_aedes_videos
    name: Zenodo Aedes aegypti video search results
    source_type: public_dataset_api
    boundary: Bounded Zenodo API search results for Aedes aegypti moving-image files where source-provided title, description, keywords, notes, or equivalent metadata materially names Aedes aegypti; search terms alone do not count as species evidence
    query_plane: zenodo_records_search_file_manifest_to_sqlite_media_records
    api_base: https://zenodo.org/api/records
    artifact_dir: artifacts/mosquito-v1/raw/zenodo_aedes_videos
    ingest_script: scripts/ingest_zenodo_aedes_videos.py
    lanes:
      - media
    provenance_required: true
    live_fetch: opt_in_bounded
    binary_policy: metadata_and_download_locators_only_by_default
    source_contract:
      video_file_records:
        - zenodo_record_id
        - filename
        - download_url
        - source_url
        - license
        - source_byte_size
        - source_hashes
        - exact_raw_search_locator
  - id: figshare_aedes_videos
    name: Figshare Aedes aegypti video search results
    source_type: public_dataset_api
    boundary: Bounded Figshare article search and detail API results for Aedes aegypti moving-image files where source-provided title, description, tags, categories, DOI, or equivalent metadata materially names Aedes aegypti; search terms alone do not count as species evidence
    query_plane: figshare_article_search_detail_file_manifest_to_sqlite_media_records
    api_base: https://api.figshare.com/v2/articles
    artifact_dir: artifacts/mosquito-v1/raw/figshare_aedes_videos
    ingest_script: scripts/ingest_figshare_aedes_videos.py
    lanes:
      - media
    provenance_required: true
    live_fetch: opt_in_bounded
    binary_policy: metadata_and_download_locators_only_by_default
    source_contract:
      video_file_records:
        - figshare_article_id
        - figshare_file_id
        - filename
        - doi
        - download_url
        - source_url
        - license
        - source_byte_size
        - source_hashes
        - exact_article_detail_locator
  - id: aedes_video_atoms
    name: Aedes aegypti verified video atoms and motion rows
    source_type: derived_sqlite_source
    boundary: Derived Aedes aegypti video intelligence records from indexed PMC, Dryad, Mendeley, OSF, Zenodo, repository-discovery candidates, bounded mirrored videos, ffprobe metadata, inspectable thumbnails, keyframes, preview clips, frame manifests, source-table motion rows, and explicit structured gaps for huge files, unclear licenses, missing downloads, non-video download responses, failed probes, or out-of-scope discoveries. Discovery requires source-provided material metadata to name Aedes aegypti; repository search terms alone are not source evidence. Gaps preserve download URL, source URL, byte size, source-provided hashes when available, license text, dataset, repository, and locator.
    query_plane: indexed_video_records_motion_tables_and_repository_discovery_to_sqlite_video_atoms
    artifact_dir: artifacts/mosquito-v1/raw/video_atoms
    ingest_script: scripts/ingest_video_atoms.py
    input_sources:
      - pmc_open_access_videos
      - dryad_aedes_behavior_videos
      - mendeley_aedes_behavior_media
      - osf_flighttrackai_aedes_videos
      - zenodo_aedes_videos
      - figshare_aedes_videos
      - PMC OA supplements
      - Dryad
      - Mendeley Data
      - OSF
      - Zenodo
      - Figshare
      - institutional repositories
      - paper supplements
    discovery_targets:
      - pmc_oa
      - dryad
      - mendeley
      - osf
      - zenodo
      - figshare
      - institutional
      - paper_supplements
    lanes:
      - media
      - behavior
    provenance_required: true
    live_fetch: derived_from_indexed_video_sources
    binary_policy: bounded_mirror_when_license_and_size_allow_else_structured_gap
    gap_reasons:
      - video_download_not_video
      - video_download_failed
      - video_download_url_missing
      - video_license_unclear
      - video_too_large
      - video_archive_not_expanded
      - video_probe_failed
      - video_probe_tool_missing
    source_contract:
      mirror_or_gap:
        - checksum
        - byte_size
        - duration
        - fps
        - resolution
        - codec
        - source_paper_or_dataset
        - license
        - exact_locator
      inspectable_artifacts:
        - thumbnails
        - keyframes
        - preview_clips
        - frame_manifests
      queryable_motion_rows:
        - behavior_type
        - life_stage
        - sex
        - assay
        - stimulus
        - arena
        - frame_or_time_range
        - track_id
        - coordinates
        - confidence
      structured_gaps:
        - video_license_unclear
        - video_too_large
        - video_download_url_missing
        - video_probe_failed
        - video_artifact_generation_failed
        - video_discovery_not_aedes_scope
  - id: irmapper_aedes
