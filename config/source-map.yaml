  - id: aedes_resistance_markers
    name: Aedes aegypti resistance marker records
    source_type: derived_sqlite_source
    boundary: Deterministic kdr, VGSC, and metabolic-resistance marker extraction from source-grade Aedes aegypti literature records and legal full-text units where available
    query_plane: literature_records_and_fulltext_units_to_sqlite_resistance_marker_records
