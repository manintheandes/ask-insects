sources:
  - id: mosquito_v1_fixtures
    name: Ask Insects mosquito V1 fixture source
    source_type: local_fixture
    boundary: mosquitoes first
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/mosquito-v1
    artifacts:
      sqlite_index: artifacts/mosquito-v1/source_index.sqlite
      sqlite_payload_table: record_payloads
      source_status: artifacts/mosquito-v1/source_status.json
      source_receipt: artifacts/mosquito-v1/source_receipt.json
      gaps: artifacts/mosquito-v1/gaps.json
    lanes:
      - taxonomy
      - observations
      - media
      - literature
      - action_notes
    provenance_required: true
  - id: aedes_source_coverage
    name: Aedes aegypti source coverage ledger records
    source_type: derived_repo_ledger
    boundary: Queryable Ask Insects coverage, missing-source, source-contract gate, and completion-evidence records derived from config/mosquito-intelligence-coverage.json
    query_plane: coverage_ledger_to_sqlite_source_coverage_records
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/ingest_source_coverage.py
    input_ledger: config/mosquito-intelligence-coverage.json
    lanes:
      - source_coverage
    provenance_required: true
    live_fetch: derived_from_repo_ledger
  - id: drosophila_suzukii_core
    name: Drosophila suzukii spotted wing drosophila core source boundary
    source_type: public_api_composite
    boundary: Bounded spotted wing drosophila source-grade expansion for Drosophila suzukii, preserving GBIF taxonomy and occurrences, iNaturalist licensed-photo observations, OpenAlex literature metadata since 2020, BOLD DNA barcode rows, and source-coverage status for deeper behavior video, genomics, ecology, crop-damage, management, resistance, and biocontrol lanes
    query_plane: gbif_inaturalist_openalex_bold_to_sqlite_composite_source
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii
    ingest_script: scripts/ingest_drosophila_suzukii.py
    upstream_sources:
      - gbif_api
      - inaturalist_api
      - openalex_api
      - bold_api
    lanes:
      - taxonomy
      - observations
      - media
      - literature
      - dna_barcodes
      - source_coverage
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      source_grade_now:
        - taxonomy_match
        - occurrence_records
        - licensed_still_image_records
        - literature_metadata_records
        - dna_barcode_records_when_bold_exposes_rows
        - per_domain_source_coverage_records
      promoted_follow_on_lanes:
        - drosophila_suzukii_deep_sources
        - drosophila_suzukii_extracted_facts
        - drosophila_suzukii_genome_files
        - drosophila_suzukii_ncbi_nucleotide
        - drosophila_suzukii_ncbi_marker_review
        - drosophila_suzukii_ncbi_snp_variation
        - drosophila_suzukii_ncbi_gene_orthologs
        - drosophila_suzukii_ensembl_metazoa_orthology
        - drosophila_suzukii_geo_expression_matrices
        - drosophila_suzukii_population_genomics
        - drosophila_suzukii_dryad_population_variants
        - drosophila_suzukii_video_atoms
        - drosophila_suzukii_occurrence_ecology
        - drosophila_suzukii_extension_guidance
        - drosophila_suzukii_jki_drosomon_trap_captures
        - drosophila_suzukii_umn_flight_assay_rows
  - id: drosophila_suzukii_deep_sources
    name: Drosophila suzukii deep public source expansion
    source_type: public_api_composite
    boundary: Bounded deep spotted wing drosophila source expansion for Drosophila suzukii, preserving NCBI assembly, BioProject, BioSample, SRA, UniProt protein/proteome, Zenodo, Figshare, and Dryad repository-candidate metadata, plus explicit source status for follow-on genome-file parsing, supplement audit, crop-damage management guidance, resistance, and biocontrol assay extraction
    query_plane: ncbi_uniprot_repository_metadata_to_sqlite_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_deep_sources
    ingest_script: scripts/ingest_drosophila_suzukii_deep_sources.py
    upstream_sources:
      - ncbi_eutils_assembly
      - ncbi_eutils_bioproject
      - ncbi_eutils_biosample
      - ncbi_eutils_sra
      - uniprot_rest
      - zenodo_records
      - figshare_articles
      - dryad_search
      - dryad_version_file_manifests
    lanes:
      - genome_assemblies
      - genome_features
      - biosamples
      - expression
      - proteins
      - media
      - behavior
      - literature
      - ecology
      - resistance
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      source_grade_now:
        - ncbi_assembly_metadata
        - ncbi_bioproject_metadata
        - ncbi_biosample_metadata
        - ncbi_sra_run_metadata
        - uniprot_protein_and_proteome_metadata
        - repository_video_or_dataset_candidates
        - dryad_file_manifest_records_with_size_checksum_download_url
        - explicit_gap_records_for_missing_deeper_lanes
      promoted_follow_on_lanes:
        - drosophila_suzukii_genome_files
        - drosophila_suzukii_extracted_facts
        - drosophila_suzukii_video_atoms
        - drosophila_suzukii_dryad_table_rows
        - drosophila_suzukii_occurrence_ecology
        - drosophila_suzukii_jki_drosomon_trap_captures
        - drosophila_suzukii_literature_fulltext
        - drosophila_suzukii_pubmed_literature
        - drosophila_suzukii_ncbi_snp_variation
        - drosophila_suzukii_geo_expression_matrices
        - drosophila_suzukii_population_genomics
        - drosophila_suzukii_dryad_population_variants
        - drosophila_suzukii_extension_guidance
        - drosophila_suzukii_umn_flight_assay_rows
  - id: drosophila_suzukii_dryad_table_rows
    name: Drosophila suzukii Dryad preview table rows
    source_type: derived_sqlite_source
    boundary: Row-level spotted wing drosophila Dryad table evidence parsed from public Dryad preview tables exposed by indexed drosophila_suzukii_deep_sources file manifests, with explicit gaps when preview IDs are missing, previews cannot be parsed, direct downloads are blocked, or table-file limits apply
    query_plane: drosophila_suzukii_deep_sources_dryad_file_manifests_to_preview_table_sheet_and_row_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_dryad_table_rows
    ingest_script: scripts/ingest_drosophila_suzukii_dryad_table_rows.py
    input_sources:
      - drosophila_suzukii_deep_sources
      - dryad_file_manifest
      - dryad_public_preview
    lanes:
      - behavior
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      source_grade_now:
        - dryad_public_preview_table_sheet_records
        - dryad_public_preview_table_row_records
        - direct_download_blocked_preview_used_gap_records
        - preview_fetch_or_parse_gap_records
      not_claimed:
        - full_private_or_token_required_dryad_downloads
        - row-level parsing for non-tabular previews
  - id: drosophila_suzukii_literature_fulltext
    name: Drosophila suzukii legal literature full-text units
    source_type: derived_sqlite_fulltext_source
    boundary: Legal direct open full-text chunks for indexed Drosophila suzukii literature records when OpenAlex or Unpaywall exposes a direct PDF, XML, HTML, or text file that Ask Insects can fetch and parse without private access, cookies, institutional scraping, or paywalled workarounds
    query_plane: drosophila_suzukii_literature_records_to_literature_fulltext_units_and_literature_fulltext_fts
    artifact_dir: artifacts/mosquito-v1
    sqlite_fulltext_table: literature_fulltext_units
    ingest_script: scripts/ingest_drosophila_suzukii_literature_fulltext.py
    input_sources:
      - drosophila_suzukii_core
      - openalex_best_oa_location
      - unpaywall_legal_direct_fulltext
    lanes:
      - literature_fulltext
    provenance_required: true
    live_fetch: bounded_opt_in
    legal_fulltext_only: true
    source_contract:
      source_grade_now:
        - legal_direct_fulltext_chunks
        - direct_open_pdf_or_xml_or_html_or_text_chunks_when_fetchable
        - fulltext_fetch_or_parse_gaps_for_failed_direct_files
        - unpaywall_no_direct_fulltext_gaps_when_unpaywall_is_enabled
      not_claimed:
        - paywalled_pdfs
        - institutional_proxy_access
        - publisher_landing_pages_without_direct_open_files
        - human_validated_scientific_claim_extraction
  - id: drosophila_suzukii_pubmed_literature
    name: Drosophila suzukii PubMed literature reconciliation
    source_type: public_api_metadata_audit
    boundary: Bounded PubMed ESearch and ESummary metadata for Drosophila suzukii and spotted wing drosophila papers from 2020 onward, reconciled against the canonical drosophila_suzukii_core OpenAlex literature rows by DOI and normalized title
    query_plane: pubmed_esearch_esummary_to_sqlite_literature_audit_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_pubmed_literature
    ingest_script: scripts/ingest_drosophila_suzukii_pubmed_literature.py
    input_sources:
      - pubmed_eutilities
      - drosophila_suzukii_core
    lanes:
      - literature
    provenance_required: true
    live_fetch: bounded_opt_in
    source_contract:
      source_grade_now:
        - one_pubmed_candidate_per_pmid
        - raw_pubmed_esearch_and_esummary_locators
        - coverage_status_already_indexed_or_pubmed_metadata_ingested
        - matched_openalex_record_ids_when_doi_or_title_matches
        - explicit_result_limit_and_fetch_failure_gaps
      not_claimed:
        - pubmed_as_canonical_paper_identity
        - paywalled_full_text
        - human_validated_scientific_claim_extraction
  - id: drosophila_suzukii_extracted_facts
    name: Drosophila suzukii extracted literature facts, supplement manifests, and per-paper supplement audits
    source_type: derived_sqlite_source
    boundary: Deterministic spotted wing drosophila cross-lane candidate facts, supplement manifests, per-paper supplement audit atoms, supported parsed supplement table rows, parsed-but-unpromoted supplement row atoms, and supplement file-gap atoms from indexed Drosophila suzukii literature records, record payload supplement metadata, public supplement metadata routes reused from the Aedes extracted-facts lane, public supplement files, and legal literature_fulltext_units
    query_plane: drosophila_suzukii_literature_records_payloads_fulltext_units_supported_supplement_tables_and_per_paper_supplement_audits_to_sqlite_fact_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_extracted_facts
    ingest_script: scripts/ingest_drosophila_suzukii_extracted_facts.py
    input_sources:
      - drosophila_suzukii_core
      - record_payloads
      - literature_fulltext_units
      - europe_pmc_metadata
      - pmc_oa_metadata
      - crossref_relation_metadata
      - datacite_related_identifiers
      - unpaywall_oa_locations
      - figshare_metadata
      - zenodo_metadata
      - dryad_metadata
      - publisher_landing_page_links
      - fulltext_link_mining
    supported_supplement_formats:
      - csv
      - tsv
      - xlsx
      - docx
      - xml
      - html
      - txt
      - md
      - log
      - r
      - pdf
    lanes:
      - literature
      - behavior
      - crop_damage
      - management
      - resistance
      - biocontrol
      - ecology
      - genomics
    provenance_required: true
    live_fetch: bounded_opt_in_supplement_discovery_and_download
    legal_fulltext_only: true
    confidence_policy: candidate_manifest_or_parsed_not_human_validated
    supplement_completion_contract:
      required_grain: one_supplement_audit_atom_per_indexed_drosophila_suzukii_literature_paper
      complete_only_if:
        - supplement_audit_count_equals_source_paper_count
        - every_public_supported_supplement_table_row_is_parsed
        - every_schema_promotable_row_is_promoted_to_a_structured_lane
        - every_non_promoted_case_has_queryable_reason_and_provenance
  - id: drosophila_suzukii_susceptibility_assay_rows
    name: Drosophila suzukii susceptibility and resistance evidence rows
    source_type: derived_sqlite_source
    boundary: Schema-validated promotion of parsed Drosophila suzukii susceptibility or resistance supplement table rows from drosophila_suzukii_extracted_facts, plus bounded candidate literature evidence when records include insecticide terms and assay or response metrics; preserves insecticide terms, assay terms, metric fields, table rows when available, source paper ID, extracted-fact ID, exact locator, and a queryable source-gap record when no parsed susceptibility table row passes validation
    query_plane: drosophila_suzukii_extracted_facts_resistance_records_to_sqlite_susceptibility_evidence
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/ingest_drosophila_suzukii_susceptibility_assay_rows.py
    input_sources:
      - drosophila_suzukii_extracted_facts
    lanes:
      - resistance
    provenance_required: true
    live_fetch: derived_from_indexed_extracted_facts
    legal_fulltext_only: true
    validation_status: parsed_table_schema_validated_or_candidate_not_human_validated
    source_contract:
      source_grade_now:
        - schema_validated_table_rows_when_parsed_supplement_rows_pass
        - candidate_literature_evidence_rows_for_insecticide_assay_or_metric_mentions
        - explicit_gap_when_no_parsed_susceptibility_table_rows_pass
      not_claimed:
        - human_validated_susceptibility_assay_interpretation
        - complete parsing of every publisher table format
        - replacement for raw supplementary assay spreadsheets not yet discovered or parsed
  - id: drosophila_suzukii_biocontrol_outcome_rows
    name: Drosophila suzukii biocontrol outcome evidence rows
    source_type: derived_sqlite_source
    boundary: Schema-validated promotion of parsed Drosophila suzukii biocontrol supplement table rows from drosophila_suzukii_extracted_facts when available, plus bounded candidate literature evidence when records include biological-control agent terms and assay, target-stage, effect-metric, percent, or temperature context; preserves agent terms, assay terms, effect metric terms, target stages, numeric values, source paper ID, extracted-fact ID, exact locator, and a queryable source-gap record when no parsed biocontrol table row passes validation
    query_plane: drosophila_suzukii_extracted_facts_biocontrol_records_to_sqlite_outcome_evidence
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/ingest_drosophila_suzukii_biocontrol_outcome_rows.py
    input_sources:
      - drosophila_suzukii_extracted_facts
    lanes:
      - biocontrol
    provenance_required: true
    live_fetch: derived_from_indexed_extracted_facts
    legal_fulltext_only: true
    validation_status: parsed_table_schema_validated_or_candidate_not_human_validated
    source_contract:
      source_grade_now:
        - schema_validated_table_rows_when_parsed_biocontrol_supplement_rows_pass
        - candidate_literature_evidence_rows_for_biocontrol_agent_and_outcome_context
        - explicit_gap_when_no_parsed_biocontrol_table_rows_pass
      not_claimed:
        - human_validated_biocontrol_outcome_interpretation
        - complete parsing of every publisher table format
        - replacement for raw supplementary biocontrol spreadsheets not yet discovered or parsed
  - id: drosophila_suzukii_video_atoms
    name: Drosophila suzukii verified video atoms, motion intervals, and trajectory gaps
    source_type: derived_sqlite_source
    boundary: Derived spotted wing drosophila video intelligence records from indexed Drosophila suzukii repository media, paper-supplement manifests, bounded mirrors, ffprobe metadata, inspectable thumbnails, sampled keyframes, preview clips, frame manifests, cautious derived full-video motion intervals for verified clips, direct Dryad 10.5061/dryad.8vd762q TIFF frame-archive manifests for SWD-involved copulation videos, and explicit structured gaps for huge files, unclear licenses, missing downloads, blocked Dryad previews, unmirrored frame archives, TIFF sequence decoding, failed artifact generation, or missing source trajectory tables
    query_plane: drosophila_suzukii_indexed_video_records_and_dryad_frame_archives_to_sqlite_video_atoms
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_video_atoms
    ingest_script: scripts/ingest_drosophila_suzukii_video_atoms.py
    input_sources:
      - drosophila_suzukii_deep_sources
      - drosophila_suzukii_extracted_facts
      - dryad_10_5061_dryad_8vd762q
    lanes:
      - media
      - behavior
    provenance_required: true
    live_fetch: derived_from_indexed_spotted_wing_drosophila_video_sources
    binary_policy: bounded_mirror_when_license_and_size_allow_else_structured_gap
    gap_reasons:
      - swd_video_candidates_not_found
      - video_license_unclear
      - video_too_large
      - video_download_failed
      - video_probe_failed
      - video_probe_tool_missing
      - video_artifact_generation_failed
      - video_artifact_tool_missing
      - source_trajectory_tables_not_available_for_swd
      - dryad_frame_archive_preview_fetch_failed
      - dryad_frame_archive_binary_not_mirrored
      - dryad_frame_archive_too_large_to_mirror
      - dryad_frame_archive_download_failed
      - dryad_frame_archive_zip_parse_failed
      - dryad_frame_archive_keyframe_generation_failed
      - dryad_tiff_frame_sequence_not_decoded_to_video
      - dryad_frame_archive_motion_rows_not_available
      - dryad_inner_spreadsheet_not_parsed
    source_contract:
      mirror_or_gap:
        - checksum
        - byte_size
        - duration
        - fps
        - resolution
        - codec
        - source_paper_or_dataset
        - license
        - exact_locator
      inspectable_artifacts:
        - thumbnails
        - keyframes
        - preview_clips
        - frame_manifests
      queryable_motion_rows:
        - behavior_type
        - life_stage
        - sex
        - assay
        - stimulus
        - arena
        - frame_or_time_range
        - track_id
        - coordinates
        - confidence
      structured_gaps:
        - source_trajectory_tables_not_available_for_swd
        - video_license_unclear
        - video_too_large
        - video_download_failed
        - dryad_frame_archive_preview_fetch_failed
        - dryad_frame_archive_binary_not_mirrored
        - dryad_frame_archive_too_large_to_mirror
        - dryad_frame_archive_download_failed
        - dryad_frame_archive_zip_parse_failed
        - dryad_frame_archive_keyframe_generation_failed
        - dryad_tiff_frame_sequence_not_decoded_to_video
        - dryad_frame_archive_motion_rows_not_available
        - dryad_inner_spreadsheet_not_parsed
  - id: drosophila_suzukii_genome_files
    name: Drosophila suzukii NCBI genome GFF and protein files
    source_type: public_ncbi_genome_files
    boundary: Parsed Drosophila suzukii NCBI RefSeq/GenBank genome annotation files for a selected assembly, including assembly metadata, downloaded genomic GFF rows, protein FASTA records, and structured gaps for missing assembly metadata, missing FTP paths, oversized files, or failed downloads
    query_plane: drosophila_suzukii_ncbi_assembly_gff_protein_files_to_sqlite_genome_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_genome_files
    ingest_script: scripts/ingest_drosophila_suzukii_genome_files.py
    default_assembly_accession: GCF_043229965.1
    input_sources:
      - drosophila_suzukii_deep_sources
      - NCBI genome FTP
    lanes:
      - genome_assemblies
      - genome_features
      - genes
      - transcripts
      - proteins
    provenance_required: true
    live_fetch: opt_in_bounded
    binary_policy: bounded_public_ncbi_text_downloads
    source_contract:
      parsed_files:
        - genomic.gff
        - protein.faa
      parsed_fields:
        - assembly_accession
        - sequence_id
        - feature_type
        - start
        - end
        - strand
        - gff_attributes
        - protein_accession
        - sequence_length
  - id: drosophila_suzukii_ncbi_nucleotide
    name: Drosophila suzukii NCBI GenBank nucleotide cross-check
    source_type: public_ncbi_eutils
    boundary: Bounded NCBI nuccore/GenBank COI and barcode metadata cross-check for Drosophila suzukii, matching accessions back to BOLD when possible while preserving GenBank-only records as metadata evidence. This is a barcode/nucleotide cross-check, not canonical taxonomy, genome assembly parsing, or proof of sequence equivalence.
    query_plane: ncbi_nuccore_esearch_esummary_to_sqlite_dna_barcode_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_ncbi_nucleotide
    ingest_script: scripts/ingest_drosophila_suzukii_ncbi_nucleotide.py
    input_sources:
      - ncbi_eutilities_nuccore
      - drosophila_suzukii_core
      - BOLD accessions when available
    lanes:
      - dna_barcodes
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      parsed_fields:
        - uid
        - accession_version
        - marker
        - sequence_length
        - country
        - collection_date
        - specimen_voucher
        - bold_match_status
        - matched_bold_record_ids
      structured_gaps:
        - swd_ncbi_nucleotide_limit_applied
        - swd_ncbi_nucleotide_search_failed
        - swd_ncbi_nucleotide_summary_failed
  - id: drosophila_suzukii_ncbi_marker_review
    name: Drosophila suzukii NCBI mitochondrial and nuclear marker review
    source_type: public_ncbi_eutils
    boundary: Bounded NCBI nuccore/GenBank metadata review for Drosophila suzukii mitochondrial and nuclear marker accessions, including COI/COX1, COII/COX2, NADH/ND loci, cytochrome b, ribosomal 18S/28S, ITS, elongation-factor, and other marker-like records. This is accession metadata evidence and source discovery, not proof of sequence equivalence, variant interpretation, or canonical taxonomy.
    query_plane: ncbi_nuccore_esearch_esummary_to_sqlite_marker_review_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_ncbi_marker_review
    ingest_script: scripts/ingest_drosophila_suzukii_ncbi_marker_review.py
    input_sources:
      - ncbi_eutilities_nuccore
      - drosophila_suzukii_ncbi_nucleotide
      - drosophila_suzukii_core
    lanes:
      - dna_barcodes
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      parsed_fields:
        - uid
        - accession_version
        - title
        - marker_group
        - sequence_length
        - biomol
        - moltype
        - genome
        - taxid
        - createdate
        - updatedate
        - query
      structured_gaps:
        - swd_ncbi_marker_review_limit_applied
        - swd_ncbi_marker_review_search_failed
        - swd_ncbi_marker_review_summary_failed
  - id: drosophila_suzukii_ncbi_snp_variation
    name: Drosophila suzukii NCBI dbSNP variation audit
    source_type: public_ncbi_eutils
    boundary: Bounded NCBI dbSNP organism-query audit for Drosophila suzukii. If dbSNP returns zero organism records, Ask Insects stores that as a queryable source-gap record instead of implying variant coverage. This is an audit of dbSNP availability, not a broader population-variant table parser.
    query_plane: ncbi_dbsnp_esearch_esummary_to_sqlite_variant_or_gap_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_ncbi_snp_variation
    ingest_script: scripts/ingest_drosophila_suzukii_ncbi_snp_variation.py
    input_sources:
      - ncbi_eutilities_snp
    lanes:
      - genome_features
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      structured_gaps:
        - ncbi_snp_no_swd_records
        - ncbi_snp_search_failed
        - ncbi_snp_summary_failed
        - ncbi_snp_limit_applied
  - id: drosophila_suzukii_figshare_mk_selection
    name: Drosophila suzukii Figshare McDonald-Kreitman selection table rows
    source_type: public_figshare_csv
    boundary: Public Figshare dataset DOI 10.6084/m9.figshare.13366079.v3, file 26251579, parsed at row grain for McDonald-Kreitman and adaptive-evolution statistics for Drosophila suzukii, D. subpulchrella, and D. melanogaster homolog rows. This lane is a small published selection table, not a whole-genome VCF mirror or dbSNP replacement.
    query_plane: figshare_csv_to_sqlite_genome_feature_records
    artifact_dir: artifacts/mosquito-v1
    raw_artifact_dir: artifacts/mosquito-v1/raw/drosophila_suzukii_figshare_mk_selection
    ingest_script: scripts/ingest_drosophila_suzukii_figshare_mk_selection.py
    input_sources:
      - figshare_file_26251579
    lanes:
      - genome_features
    provenance_required: true
    live_fetch: opt_in_bounded
    source_contract:
      parsed_fields:
        - article_id
        - dataset_doi
        - file_id
        - file_name
