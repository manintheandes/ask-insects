sources:
  - id: mosquito_v1_fixtures
    name: Ask Insects mosquito V1 fixture source
    source_type: local_fixture
    boundary: mosquitoes first
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/mosquito-v1
    artifacts:
      sqlite_index: artifacts/mosquito-v1/source_index.sqlite
      sqlite_payload_table: record_payloads
      source_status: artifacts/mosquito-v1/source_status.json
      source_receipt: artifacts/mosquito-v1/source_receipt.json
      gaps: artifacts/mosquito-v1/gaps.json
    lanes:
      - taxonomy
      - observations
      - media
      - literature
      - action_notes
    provenance_required: true
  - id: gbif_api
    name: Global Biodiversity Information Facility API
    source_type: public_api
    boundary: Aedes aegypti taxonomy and occurrence pulls, including deep hosted refreshes
    query_plane: gbif_species_match_and_occurrence_search
    api_base: https://api.gbif.org
    artifact_dir: artifacts/mosquito-v1/raw/gbif
    lanes:
      - taxonomy
      - observations
    provenance_required: true
    live_fetch: opt_in_hosted
  - id: inaturalist_api
    name: iNaturalist public observations API
    source_type: public_api
    boundary: bounded Aedes aegypti and mosquito observations with licensed photos, refreshed incrementally so existing source lanes are preserved
    query_plane: inaturalist_observation_search
    api_base: https://api.inaturalist.org/v1
    artifact_dir: artifacts/mosquito-v1/raw/inaturalist
    ingest_script: scripts/ingest_inaturalist_observations.py
    lanes:
      - observations
      - media
    provenance_required: true
    live_fetch: opt_in
  - id: mosquito_alert_gbif
    name: Mosquito Alert Aedes aegypti GBIF observations and images
    source_type: public_api_dataset
    boundary: Mosquito Alert Dataset GBIF occurrence records for Aedes aegypti, pinned to datasetKey 1fef1ead-3d02-495e-8ff1-6aeb01123408 and taxonKey 1651891, with still-image media metadata
    query_plane: gbif_dataset_occurrence_search_to_sqlite
    api_base: https://api.gbif.org
    dataset_key: 1fef1ead-3d02-495e-8ff1-6aeb01123408
    dataset_doi: 10.15470/t5a1os
    artifact_dir: artifacts/mosquito-v1/raw/mosquito_alert
    ingest_script: scripts/ingest_mosquito_alert_observations.py
    lanes:
      - observations
      - media
    provenance_required: true
    live_fetch: opt_in
  - id: aedes_occurrence_ecology
    name: Aedes aegypti occurrence ecology summaries
    source_type: derived_sqlite_source
    boundary: GBIF and iNaturalist observation joins plus Mosquito Alert Aedes aegypti observations summarized into country, country-month, seasonality, range, and public habitat ecology records
    query_plane: indexed_observation_payloads_to_sqlite_ecology_records
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/ingest_occurrence_ecology.py
    input_sources:
      - gbif_api
      - inaturalist_api
      - mosquito_alert_gbif
    lanes:
      - ecology
    provenance_required: true
    live_fetch: derived_from_indexed_observations
  - id: aedes_literature_openalex
    name: Aedes aegypti literature since 2020
    source_type: public_api_composite
    boundary: OpenAlex articles where Aedes aegypti is material in title, abstract, or accepted topic metadata from 2020-01-01 through run date
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/aedes-literature-2020
    artifacts:
      sqlite_index: artifacts/aedes-literature-2020/source_index.sqlite
      sqlite_payload_table: record_payloads
      sqlite_fulltext_table: literature_fulltext_units
      source_status: artifacts/aedes-literature-2020/source_status.json
      source_receipt: artifacts/aedes-literature-2020/source_receipt.json
      enrichment_receipt: artifacts/aedes-literature-2020/literature_enrichment_receipt.json
      gaps: artifacts/aedes-literature-2020/gaps.json
    lanes:
      - literature
    query_commands:
      - search literature
      - search fulltext
      - ask literature questions with metadata and legal full-text fallback
    provenance_required: true
    live_fetch: opt_in
    enrichment_sources:
      - pubmed_eutilities
      - unpaywall_api
  - id: ncbi_datasets_genome
    name: NCBI Datasets Aedes aegypti genome package
    source_type: local_or_hosted_dataset_package
    boundary: Aedes aegypti assembly GCF_002204515.2 assembly metadata, GFF features, and protein FASTA headers
    query_plane: sqlite_atomic_index
    package_layout: ncbi_dataset/data
    artifact_dir: artifacts/mosquito-v1/raw/ncbi_genome
    assembly_accession: GCF_002204515.2
    lanes:
      - genome_assemblies
      - genome_features
      - genes
      - transcripts
      - proteins
    provenance_required: true
    live_fetch: package_path_required
  - id: ncbi_biosamples
    name: NCBI BioSample Aedes aegypti sample metadata
    source_type: public_api
    boundary: Bounded NCBI BioSample records for Aedes aegypti, including accession, organism, sample name, strain or isolate when present, collection date, geography, tissue, isolation source, organization, and linked SRA identifiers when NCBI exposes them
    query_plane: ncbi_eutils_biosample_esearch_esummary_to_sqlite
    api_base: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
    artifact_dir: artifacts/mosquito-v1/raw/ncbi_biosamples
    ingest_script: scripts/ingest_ncbi_biosamples.py
    lanes:
      - biosamples
    provenance_required: true
    live_fetch: opt_in_bounded
  - id: vectorbase_aedes_genomics
    name: VectorBase/VEuPathDB Aedes aegypti genomics downloads
    source_type: public_bulk_download
    boundary: Official VectorBase current-release AaegyptiLVP_AGWG GFF, annotated protein FASTA, and GO GAF files for Aedes aegypti genes, transcripts, proteins, and GO annotations
    query_plane: vectorbase_current_release_downloads_to_sqlite
    api_base: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG
    artifact_dir: artifacts/mosquito-v1/raw/vectorbase_genomics
    ingest_script: scripts/ingest_vectorbase_genomics.py
    files:
      gff: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/gff/data/VectorBase-68_AaegyptiLVP_AGWG.gff
      proteins: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/fasta/data/VectorBase-68_AaegyptiLVP_AGWG_AnnotatedProteins.fasta
      go: https://vectorbase.org/common/downloads/Current_Release/AaegyptiLVP_AGWG/gaf/VectorBase-CURRENT_AaegyptiLVP_AGWG_GO.gaf.gz
    lanes:
      - genes
      - transcripts
      - proteins
      - genome_features
    provenance_required: true
    live_fetch: opt_in
  - id: bold_api
    name: BOLD public Aedes aegypti DNA barcode records
    source_type: public_api
    boundary: Bounded public BOLD combined TSV records for Aedes aegypti DNA barcode specimens, including marker, country, collection metadata, BIN, GenBank accession, and sequence length when provided
    query_plane: bold_public_combined_tsv
    api_base: https://v3.boldsystems.org/index.php/API_Public/combined
    artifact_dir: artifacts/mosquito-v1/raw/bold
    ingest_script: scripts/ingest_bold_barcodes.py
    lanes:
      - dna_barcodes
    provenance_required: true
    live_fetch: opt_in
  - id: pmc_open_access_videos
    name: PMC open-access Aedes aegypti supplementary videos
    source_type: public_article_media
    boundary: Curated public PMC articles with Aedes aegypti supplementary moving-image files, especially behavior, host-seeking, biting, and photopreference clips
    query_plane: pmc_article_html_video_links
    artifact_dir: artifacts/mosquito-v1/raw/pmc_videos
    ingest_script: scripts/ingest_pmc_videos.py
    lanes:
      - media
    provenance_required: true
    live_fetch: opt_in
  - id: dryad_aedes_behavior_videos
    name: Dryad Aedes aegypti behavior and video dataset manifests
    source_type: public_dataset_api
    boundary: Public Dryad datasets with materially Aedes aegypti behavior/video data, including host-seeking, visual-threat, flight-escape, mating, courtship, and thermal-infrared assay files
    query_plane: dryad_dataset_version_file_manifest_to_sqlite
    api_base: https://datadryad.org/api/v2
    artifact_dir: artifacts/mosquito-v1/raw/dryad_behavior_videos
    ingest_script: scripts/ingest_dryad_behavior_videos.py
    lanes:
      - behavior
      - media
    provenance_required: true
    live_fetch: opt_in
    default_dois:
      - 10.5061/dryad.547d7wmh3
      - 10.5061/dryad.j6q573nr3
      - 10.5061/dryad.ttdz08m09
      - 10.5061/dryad.qz612jmrb
      - 10.5061/dryad.tb2rbp04x
      - 10.5061/dryad.z8w9ghxfv
  - id: mendeley_aedes_behavior_media
    name: Mendeley Data Aedes aegypti behavior and media manifests
    source_type: public_dataset_api
    boundary: Public Mendeley Data datasets where Aedes aegypti is materially present in the title, description, or topic, including high-speed mate-recognition videos, wingbeat sound files, flight-tone hearing data, and locomotory behavior video-analysis files
    query_plane: mendeley_public_snapshot_folder_file_manifest_to_sqlite
    api_base: https://data.mendeley.com/public-api
    artifact_dir: artifacts/mosquito-v1/raw/mendeley_behavior_media
    ingest_script: scripts/ingest_mendeley_behavior_media.py
    lanes:
      - behavior
      - media
    provenance_required: true
    live_fetch: opt_in
    default_datasets:
      - 6gvs94p6r2:1
      - g79w8wxpr7:2
      - sg5rrvdzvg:1
  - id: irmapper_aedes
    name: IR Mapper Aedes aegypti resistance records
    source_type: public_api
    boundary: Public IR Mapper Aedes endpoint filtered to Aedes aegypti and Ae. aegypti insecticide resistance records, including geography, year, assay, insecticide, status, mechanism, reference, and URL when provided
    query_plane: irmapper_aedes_json_api_to_sqlite
    api_base: https://api.irmapper.com/api/aedes
    artifact_dir: artifacts/mosquito-v1/raw/irmapper
    ingest_script: scripts/ingest_irmapper.py
    lanes:
      - resistance
    provenance_required: true
    live_fetch: opt_in
  - id: aedes_resistance_markers
    name: Aedes aegypti resistance marker records
    source_type: derived_sqlite_source
    boundary: Deterministic kdr, VGSC, and metabolic-resistance marker extraction from source-grade Aedes aegypti literature records and legal full-text units where available
    query_plane: literature_records_and_fulltext_units_to_sqlite_resistance_marker_records
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/ingest_resistance_markers.py
    input_sources:
      - aedes_literature_openalex
      - literature_fulltext_units
    lanes:
      - resistance
    provenance_required: true
    live_fetch: derived_from_indexed_literature
    legal_fulltext_only: true
  - id: aedes_neurobiology_sources
    name: Aedes aegypti neurobiology sources
    source_type: local_public_artifact_cache
    boundary: Aedes aegypti brain atlas downloads, GEO GSE160740 processed brain snRNA-seq plus SRA raw access and reanalysis workflow metadata, Mosquito Cell Atlas Zenodo files with H5AD internals, MosquitoBrains volume headers and coordinate-queryable voxel access, public Aedes EM/CATMAID repository, CATMAID API metadata, skeleton export manifest, CSV inventories, and sensory-neuron study metadata
    query_plane: sqlite_atomic_index
    artifact_dir: ~/.local/share/ask-insects/sources/neurobiology
    ingest_script: scripts/ingest_neurobiology_sources.py
    lanes:
      - neurobiology
    provenance_required: true
    live_fetch: opt_in_artifact_download
    expansion_gaps:
      - complete public whole-brain Wellcome connectome bulk package
  - id: aedes_literature_facets
    name: Aedes literature-derived intelligence facets
    source_type: derived_sqlite_source
    boundary: Keyword-derived behavior, vector competence, resistance, ecology, and public-health facets from source-grade indexed Aedes aegypti literature records and legal full-text units where available
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/build_literature_facets.py
    lanes:
      - behavior
      - vector_competence
      - resistance
      - ecology
      - public_health
    provenance_required: true
    live_fetch: derived_from_indexed_literature
  - id: aedes_pathogen_taxonomy
    name: NCBI Taxonomy Aedes-relevant arbovirus pathogen anchors
    source_type: public_api
    boundary: NCBI Taxonomy records for dengue, Zika, chikungunya, yellow fever, West Nile, and Mayaro virus as pathogen identity anchors for Aedes aegypti vector-competence and public-health evidence
    query_plane: ncbi_eutils_taxonomy_esummary_to_sqlite
    api_base: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
    artifact_dir: artifacts/mosquito-v1/raw/pathogen_taxonomy
    ingest_script: scripts/ingest_pathogen_taxonomy.py
    lanes:
      - vector_competence
    provenance_required: true
    live_fetch: opt_in
  - id: aedes_vector_competence_assays
    name: Aedes aegypti vector-competence assay candidates
    source_type: derived_sqlite_source
    boundary: Deterministic structured assay-candidate extraction from source-grade Aedes aegypti literature records and legal full-text units, limited to pathogen, infection, dissemination, transmission, dose, temperature, tissue, strain, population, and timepoint mentions
    query_plane: literature_fulltext_units_to_sqlite_vector_competence_records
    artifact_dir: artifacts/mosquito-v1
    ingest_script: scripts/ingest_vector_competence_assays.py
    input_sources:
      - aedes_literature_openalex
      - literature_fulltext_units
    lanes:
      - vector_competence
    provenance_required: true
    live_fetch: derived_from_indexed_literature
    legal_fulltext_only: true
  - id: aedes_public_health_guidance
    name: Official Aedes aegypti public-health guidance
    source_type: public_web_guidance
    boundary: WHO, PAHO, and CDC public guidance pages relevant to Aedes aegypti operational vector control, arboviral disease prevention, surveillance, and community action
    query_plane: official_guidance_html_to_sqlite_public_health_records
    artifact_dir: artifacts/mosquito-v1/raw/public_health_guidance
    ingest_script: scripts/ingest_public_health_guidance.py
    lanes:
      - public_health
    provenance_required: true
    live_fetch: opt_in
  - id: aedes_paho_dengue_surveillance
    name: PAHO dengue surveillance for Aedes aegypti public-health intelligence
    source_type: public_health_surveillance_report
    boundary: Official PAHO/WHO dengue situation report HTML and mapped ARBO/PLISA dashboard landing pages, indexed at report and visual locator grain until stable row-level CSV, JSON, or API access is proven
    query_plane: official_paho_dengue_report_html_to_sqlite_public_health_records
    artifact_dir: artifacts/mosquito-v1/raw/paho_dengue_surveillance
    ingest_script: scripts/ingest_paho_dengue_surveillance.py
    lanes:
      - public_health
    provenance_required: true
    live_fetch: opt_in
    source_gap: PAHO/PLISA country-week dashboard data remains a source gap until PAHO exposes a stable machine-readable download/API or explicit authorized access is obtained
hosted:
  provider: google_compute_engine
  vm_name: ask-insects
  remote_root: /home/josh/ask-insects
  artifact_dir: /home/josh/ask-insects/artifacts/mosquito-v1
  sqlite_index: /home/josh/ask-insects/artifacts/mosquito-v1/source_index.sqlite
coverage:
  comprehensive_strategy: Build the most comprehensive Aedes aegypti intelligence system in the world, full stop.
  ledger: config/mosquito-intelligence-coverage.json
  required_domains:
    - literature
    - genomics
    - behavior
    - observations
    - images
    - video
    - neurobiology
    - vector_competence
    - resistance
    - ecology
    - public_health
