sources:
  - id: mosquito_v1_fixtures
    name: Ask Insects mosquito V1 fixture source
    source_type: local_fixture
    boundary: mosquitoes first
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/mosquito-v1
    artifacts:
      sqlite_index: artifacts/mosquito-v1/source_index.sqlite
      sqlite_payload_table: record_payloads
      source_status: artifacts/mosquito-v1/source_status.json
      source_receipt: artifacts/mosquito-v1/source_receipt.json
      gaps: artifacts/mosquito-v1/gaps.json
    lanes:
      - taxonomy
      - observations
      - media
      - literature
      - action_notes
    provenance_required: true
  - id: gbif_api
    name: Global Biodiversity Information Facility API
    source_type: public_api
    boundary: Aedes aegypti taxonomy and occurrence pulls, including deep hosted refreshes
    query_plane: gbif_species_match_and_occurrence_search
    api_base: https://api.gbif.org
    artifact_dir: artifacts/mosquito-v1/raw/gbif
    lanes:
      - taxonomy
      - observations
    provenance_required: true
    live_fetch: opt_in_hosted
  - id: inaturalist_api
    name: iNaturalist public observations API
    source_type: public_api
    boundary: bounded mosquito observations with licensed photos
    query_plane: inaturalist_observation_search
    api_base: https://api.inaturalist.org/v1
    artifact_dir: artifacts/mosquito-v1/raw/inaturalist
    lanes:
      - observations
      - media
    provenance_required: true
    live_fetch: opt_in
  - id: aedes_literature_openalex
    name: Aedes aegypti literature since 2020
    source_type: public_api_composite
    boundary: OpenAlex articles where Aedes aegypti is material in title, abstract, or accepted topic metadata from 2020-01-01 through run date
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/aedes-literature-2020
    artifacts:
      sqlite_index: artifacts/aedes-literature-2020/source_index.sqlite
      sqlite_payload_table: record_payloads
      sqlite_fulltext_table: literature_fulltext_units
      source_status: artifacts/aedes-literature-2020/source_status.json
      source_receipt: artifacts/aedes-literature-2020/source_receipt.json
      enrichment_receipt: artifacts/aedes-literature-2020/literature_enrichment_receipt.json
      gaps: artifacts/aedes-literature-2020/gaps.json
    lanes:
      - literature
    provenance_required: true
    live_fetch: opt_in
    enrichment_sources:
      - pubmed_eutilities
      - unpaywall_api
  - id: ncbi_datasets_genome
    name: NCBI Datasets Aedes aegypti genome package
    source_type: local_or_hosted_dataset_package
    boundary: Aedes aegypti assembly GCF_002204515.2 assembly metadata, GFF features, and protein FASTA headers
    query_plane: sqlite_atomic_index
    package_layout: ncbi_dataset/data
    artifact_dir: artifacts/mosquito-v1/raw/ncbi_genome
    assembly_accession: GCF_002204515.2
    lanes:
      - genome_assemblies
      - genome_features
      - genes
      - transcripts
      - proteins
    provenance_required: true
    live_fetch: package_path_required
  - id: aedes_neurobiology_sources
    name: Aedes aegypti neurobiology source metadata
    source_type: curated_public_source_metadata
    boundary: Aedes aegypti brain atlas, neuroanatomy, brain snRNA-seq, cell atlas metadata, and sensory-neuron study metadata
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/mosquito-v1
    lanes:
      - neurobiology
    provenance_required: true
    live_fetch: deterministic_metadata
    expansion_gaps:
      - full H5AD cell matrix ingest
      - raw SRA reanalysis
      - complete connectome data
      - brain image volume parsing
hosted:
  provider: google_compute_engine
  vm_name: ask-insects
  remote_root: /home/josh/ask-insects
  artifact_dir: /home/josh/ask-insects/artifacts/mosquito-v1
  sqlite_index: /home/josh/ask-insects/artifacts/mosquito-v1/source_index.sqlite
