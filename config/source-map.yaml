sources:
  - id: mosquito_v1_fixtures
    name: Ask Insects mosquito V1 fixture source
    source_type: local_fixture
    boundary: mosquitoes first
    query_plane: sqlite_atomic_index
    artifact_dir: artifacts/mosquito-v1
    artifacts:
      sqlite_index: artifacts/mosquito-v1/source_index.sqlite
      source_status: artifacts/mosquito-v1/source_status.json
      source_receipt: artifacts/mosquito-v1/source_receipt.json
      gaps: artifacts/mosquito-v1/gaps.json
    lanes:
      - taxonomy
      - observations
      - media
      - literature
      - action_notes
    provenance_required: true
  - id: gbif_api
    name: Global Biodiversity Information Facility API
    source_type: public_api
    boundary: bounded mosquito taxonomy and occurrence pulls
    query_plane: gbif_species_match_and_occurrence_search
    api_base: https://api.gbif.org
    artifact_dir: artifacts/mosquito-v1/raw/gbif
    lanes:
      - taxonomy
      - observations
    provenance_required: true
    live_fetch: opt_in
  - id: inaturalist_api
    name: iNaturalist public observations API
    source_type: public_api
    boundary: bounded mosquito observations with licensed photos
    query_plane: inaturalist_observation_search
    api_base: https://api.inaturalist.org/v1
    artifact_dir: artifacts/mosquito-v1/raw/inaturalist
    lanes:
      - observations
      - media
    provenance_required: true
    live_fetch: opt_in
